# Permit.io Role Definitions
# Roles are assigned to ML models based on their data type

roles:
  # Network Predictor Role
  - key: network_predictor_role
    name: Network Predictor
    description: ML models that predict network metrics
    permissions:
      - resource_key: network_predictor
        actions:
          - read
          - inference
      - resource_key: latency_data
        actions:
          - read
      - resource_key: network_metrics
        actions:
          - read
      - resource_key: throughput_data
        actions:
          - read
      - resource_key: predictions
        actions:
          - write

  # Fraud Detector Role
  - key: fraud_detector_role
    name: Fraud Detector
    description: ML models that detect fraudulent behavior
    permissions:
      - resource_key: fraud_detector
        actions:
          - read
          - inference
      - resource_key: user_behavior
        actions:
          - read
      - resource_key: anomaly_scores
        actions:
          - write
      - resource_key: predictions
        actions:
          - write

  # Anomaly Detector Role
  - key: anomaly_detector_role
    name: Anomaly Detector
    description: ML models that detect network anomalies
    permissions:
      - resource_key: anomaly_detector
        actions:
          - read
          - inference
      - resource_key: network_metrics
        actions:
          - read
      - resource_key: time_series
        actions:
          - read
      - resource_key: anomaly_scores
        actions:
          - write

  # Data Source Role
  - key: data_source_role
    name: Data Source
    description: Database and storage components
    permissions:
      - resource_key: endpoint_database_query
        actions:
          - read
          - write
      - resource_key: raw
        actions:
          - read

  # ML Agent Role (generic)
  - key: ml_agent_role
    name: ML Agent
    description: Machine learning model agents from MLflow
    permissions:
      - resource_key: predictions
        actions:
          - write

  # API Consumer Role
  - key: api_consumer_role
    name: API Consumer
    description: API and gateway components
    permissions:
      - resource_key: endpoint_api_access
        actions:
          - read
          - write

  # Analytics Role
  - key: analytics_role
    name: Analytics Component
    description: Analytics and dashboard components
    permissions:
      - resource_key: aggregated
        actions:
          - read
      - resource_key: time_series
        actions:
          - read

  # Storage Role
  - key: storage_role
    name: Storage Component
    description: Storage and data lake components
    permissions:
      - resource_key: endpoint_database_query
        actions:
          - read
          - write

  # Ingestion Service Role
  - key: ingestion_role
    name: Ingestion Service
    description: Data ingestion service
    permissions:
      - resource_key: endpoint_kafka_topic
        actions:
          - produce
      - resource_key: raw
        actions:
          - write

  # Processor Role
  - key: processor_role
    name: Data Processor
    description: Data processing service
    permissions:
      - resource_key: endpoint_kafka_topic
        actions:
          - consume
          - produce
      - resource_key: time_series
        actions:
          - read
          - write
